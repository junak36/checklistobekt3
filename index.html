<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проверка на обект</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    header svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .info-bar {
      background: white;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #444;
    }

    .info-bar svg {
      width: 18px;
      height: 18px;
      color: #1a73e8;
      flex-shrink: 0;
    }

    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 16px;
      transition: background 0.15s;
    }

    .open-btn:hover { background: #1558b0; }

    .open-btn svg {
      width: 16px;
      height: 16px;
    }

    .frame-wrapper {
      flex: 1;
      background: white;
      border: 1px solid #dadce0;
      border-radius: 8px;
      overflow: hidden;
      min-height: 600px;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 600px;
      border: none;
      display: block;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #999;
      padding: 16px;
    }
  </style>
</head>
<body>

<header>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 11l3 3L22 4"/>
    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
  </svg>
  <h1>Чек лист — проверка на обект</h1>
</header>

<div class="container">

  <div class="info-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    Попълнете формуляра по-долу. Резултатите се записват автоматично.
  </div>

  <a class="open-btn"
     href="https://docs.google.com/forms/d/e/1FAIpQLSfZphnwJ3GTda88xqoZWciHvrZJ_DF7r-ceDgefADxTUSij7Q/viewform?usp=header"
     target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
      <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
    Отвори в нов прозорец
  </a>

  <div class="frame-wrapper">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSfZphnwJ3GTda88xqoZWciHvrZJ_DF7r-ceDgefADxTUSij7Q/viewform?embedded=true"
      allowfullscreen
      title="Чек лист проверка на обект">
      Зареждане на формуляра…
    </iframe>
  </div>

</div>

<footer>Резултатите се съхраняват в Google Forms &amp; Sheets</footer>

</body>
</html>
